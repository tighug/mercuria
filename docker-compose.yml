services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mercuria
      POSTGRES_PASSWORD: mercuria
      POSTGRES_DB: mercuria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://mercuria:mercuria@db:5432/mercuria
      VOICEVOX_URL: http://voicevox:50021
    depends_on:
      db:
        condition: service_started
      voicevox:
        condition: service_healthy
    volumes:
      - ./packages/server/src:/app/packages/server/src
      - ./packages/shared/src:/app/packages/shared/src

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - "5173:5173"
    environment:
      API_URL: http://server:3000
    volumes:
      - ./packages/client/src:/app/packages/client/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/client/public:/app/packages/client/public
      - ./packages/client/vite.config.ts:/app/packages/client/vite.config.ts

  voicevox:
    image: voicevox/voicevox_engine:latest
    ports:
      - "50021:50021"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50021/speakers"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
